server.port=8090

# Gateway Discovery Locator
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ── CORS global ──────────────────────────────────────────────────────────────
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173,http://localhost,https://travel.trebolapp.cl
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# M1 Person Service
spring.cloud.gateway.routes[0].id=m1-person-route
spring.cloud.gateway.routes[0].uri=lb://m1-person-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/persons/**

# M3 Search (rutas públicas de exploración — M3 llama a M2 internamente)
spring.cloud.gateway.routes[1].id=m3-search-route
spring.cloud.gateway.routes[1].uri=lb://m3-search-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/tour-packages/active, /api/tour-packages/search, /api/tour-packages/*/availability, /api/tour-packages/*/availability/check

# M2 Package Service (CRUD de paquetes, categorías, temporadas, etc.)
spring.cloud.gateway.routes[2].id=m2-package-route
spring.cloud.gateway.routes[2].uri=lb://m2-package-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/tour-packages/**, /api/categories/**, /api/seasons/**, /api/travel-types/**, /api/conditions/**, /api/restrictions/**, /api/services/**, /api/tour-package-conditions/**, /api/tour-package-restrictions/**, /api/tour-package-services/**

# M4 Reservation Service (todo /api/reservations/**)
spring.cloud.gateway.routes[3].id=m4-reservation-route
spring.cloud.gateway.routes[3].uri=lb://m4-reservation-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reservations/**

# M6 Confirmation Service (confirmaciones y seguimiento — usa /api/confirmations/**)
spring.cloud.gateway.routes[4].id=m6-confirmation-route
spring.cloud.gateway.routes[4].uri=lb://m6-confirmation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/confirmations/**

# M5 Payment Service
spring.cloud.gateway.routes[5].id=m5-payment-route
spring.cloud.gateway.routes[5].uri=lb://m5-payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/payments/**

# M7 Report Service
spring.cloud.gateway.routes[6].id=m7-report-route
spring.cloud.gateway.routes[6].uri=lb://m7-report-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/reports/**
