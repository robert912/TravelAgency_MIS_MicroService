services:

  # ══════════════════════════════════════════════════════
  #  BASES DE DATOS  (una por microservicio con DB propia)
  # ══════════════════════════════════════════════════════

  mysql-m1:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: db_m1_person
    volumes:
      - mysql-m1-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=12345678", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  mysql-m2:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: db_m2_package
    volumes:
      - mysql-m2-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=12345678", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  mysql-m4:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: db_m4_reservation
    volumes:
      - mysql-m4-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=12345678", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  mysql-m5:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: db_m5_payment
    volumes:
      - mysql-m5-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=12345678", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  mysql-m6:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: db_m6_confirmation
    volumes:
      - mysql-m6-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=12345678", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ══════════════════════════════════════════════════════
  #  INFRAESTRUCTURA
  # ══════════════════════════════════════════════════════

  eureka-server:
    build: ./eureka-server
    image: travel/eureka-server:latest
    ports:
      - "8761:8761"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  config-server:
    build: ./config-server
    image: travel/config-server:latest
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ══════════════════════════════════════════════════════
  #  MICROSERVICIOS  M1 – M7
  # ══════════════════════════════════════════════════════

  m1-person-service:
    build: ./m1-person-service
    image: travel/m1-person-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
      DB_HOST: mysql-m1
      DB_USER: root
      DB_PASSWORD: "12345678"
    depends_on:
      mysql-m1:
        condition: service_healthy
      config-server:
        condition: service_healthy

  m2-package-service:
    build: ./m2-package-service
    image: travel/m2-package-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
      DB_HOST: mysql-m2
      DB_USER: root
      DB_PASSWORD: "12345678"
    depends_on:
      mysql-m2:
        condition: service_healthy
      config-server:
        condition: service_healthy

  m3-search-service:
    build: ./m3-search-service
    image: travel/m3-search-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
      SPRING_AUTOCONFIGURE_EXCLUDE: "org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration"
    depends_on:
      config-server:
        condition: service_healthy

  m4-reservation-service:
    build: ./m4-reservation-service
    image: travel/m4-reservation-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
      DB_HOST: mysql-m4
      DB_USER: root
      DB_PASSWORD: "12345678"
    depends_on:
      mysql-m4:
        condition: service_healthy
      config-server:
        condition: service_healthy

  m5-payment-service:
    build: ./m5-payment-service
    image: travel/m5-payment-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
      DB_HOST: mysql-m5
      DB_USER: root
      DB_PASSWORD: "12345678"
    depends_on:
      mysql-m5:
        condition: service_healthy
      config-server:
        condition: service_healthy

  m6-confirmation-service:
    build: ./m6-confirmation-service
    image: travel/m6-confirmation-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
      DB_HOST: mysql-m6
      DB_USER: root
      DB_PASSWORD: "12345678"
    depends_on:
      mysql-m6:
        condition: service_healthy
      config-server:
        condition: service_healthy

  m7-report-service:
    build: ./m7-report-service
    image: travel/m7-report-service:latest
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
      MANAGEMENT_SERVER_PORT: "8081"
    depends_on:
      config-server:
        condition: service_healthy

  # ══════════════════════════════════════════════════════
  #  KEYCLOAK  (Identity Provider local)
  # ══════════════════════════════════════════════════════

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: travel-keycloak
    command: start-dev --import-realm --http-port=9090
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_URL: http://localhost:9090
      KC_HOSTNAME_ADMIN_URL: http://localhost:9090
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    volumes:
      - ./keycloak/travel-realm-realm.json:/opt/keycloak/data/import/travel-realm-realm.json
      - ./keycloak/travelapp:/opt/keycloak/themes/travelapp
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/realms/travel-realm || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ══════════════════════════════════════════════════════
  #  API GATEWAY  (único punto de acceso externo)
  # ══════════════════════════════════════════════════════

  api-gateway:
    build: ./api-gateway
    image: travel/api-gateway:latest
    ports:
      - "8090:8090"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
    depends_on:
      config-server:
        condition: service_healthy

  # ══════════════════════════════════════════════════════
  #  FRONTEND  (imagen pre-construida con URLs locales)
  # ══════════════════════════════════════════════════════

  frontend:
    image: robert912/travelagency-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      keycloak:
        condition: service_healthy
      api-gateway:
        condition: service_started
    restart: unless-stopped

# ══════════════════════════════════════════════════════
#  VOLÚMENES  (datos persistentes entre reinicios)
# ══════════════════════════════════════════════════════

volumes:
  mysql-m1-data:
  mysql-m2-data:
  mysql-m4-data:
  mysql-m5-data:
  mysql-m6-data:
