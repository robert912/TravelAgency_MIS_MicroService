# ─────────────────────────────────────────────────
#  MySQL para M1 - Person Service
# ─────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-m1-pvc
  namespace: travel-agency
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-m1
  namespace: travel-agency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-m1
  template:
    metadata:
      labels:
        app: mysql-m1
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: db-password
            - name: MYSQL_DATABASE
              value: db_m1_person
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-m1-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-m1
  namespace: travel-agency
spec:
  selector:
    app: mysql-m1
  ports:
    - port: 3306
      targetPort: 3306
---
