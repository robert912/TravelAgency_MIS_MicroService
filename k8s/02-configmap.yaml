apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: travel-agency
data:
  # Config Server URL (overrides localhost default in application.properties)
  SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
  # Eureka URL (overrides localhost default in config-server's classpath config)
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
  # Management port fijo para health probes K8s (server.port=0 sigue siendo dinámico)
  MANAGEMENT_SERVER_PORT: "8081"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
