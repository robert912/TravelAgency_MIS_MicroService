# ── M3 – Search Service (sin base de datos propia) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m3-search-service
  namespace: travel-agency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m3-search-service
  template:
    metadata:
      labels:
        app: m3-search-service
    spec:
      containers:
        - name: m3-search-service
          image: robert912/m3-search-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_AUTOCONFIGURE_EXCLUDE
              value: "org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration"
            - name: EUREKA_INSTANCE_IPADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: m3-search-service
  namespace: travel-agency
spec:
  selector:
    app: m3-search-service
  ports:
    - port: 8081
      targetPort: 8081
