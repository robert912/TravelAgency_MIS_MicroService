# ─────────────────────────────────────────────────────────────────────────────
#  Env compartido (para reutilizar en todos los microservicios)
#  Se referencia desde cada Deployment via envFrom + env específicas
# ─────────────────────────────────────────────────────────────────────────────

# ── M1 – Person Service ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m1-person-service
  namespace: travel-agency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m1-person-service
  template:
    metadata:
      labels:
        app: m1-person-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ['sh', '-c', 'until nc -z mysql-m1 3306; do echo waiting for mysql-m1; sleep 3; done']
      containers:
        - name: m1-person-service
          image: robert912/m1-person-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081   # management port (server.port=0 es dinámico)
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_HOST
              value: "mysql-m1"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: db-password
            - name: EUREKA_INSTANCE_IPADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: m1-person-service
  namespace: travel-agency
spec:
  selector:
    app: m1-person-service
  ports:
    - port: 8081
      targetPort: 8081
---
